apiVersion: v1
kind: Pod
metadata:
  name: mlperf-client
  namespace: llm-d-bench
spec:
  securityContext:
    runAsUser: 0
    seccompProfile:
      type: RuntimeDefault
  volumes:
    - name: model-storage
      persistentVolumeClaim:
        claimName: model-pvc
  containers:
    - name: client
      image: python:3.12-slim
      command: ["sleep", "infinity"]
      securityContext:
        capabilities:
          add: ["ALL"]
      volumeMounts:
        - name: model-storage
          mountPath: /mnt/models
      resources:
        requests:
          cpu: '8'
          memory: 32Gi
  restartPolicy: Never
